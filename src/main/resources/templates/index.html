<table th:if="${alunos != null and not #lists.isEmpty(alunos)}">
    <thead>
        <tr>
            <th></th>
            <th>#</th>
            <th>Nome</th>
            <th>CPF</th>
            <th>ID (UUID)</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="aluno, status : ${alunos}">
            <td>
                <img th:if="${aluno.foto != null}" th:src="${aluno.foto}"
                     style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
                <span th:if="${aluno.foto == null}"
                      style="display:inline-block;width:40px;height:40px;border-radius:50%;
                             background:#e0e0e0;line-height:40px;text-align:center;font-size:1.2rem;">
                    👤
                </span>
            </td>
            <td class="td-num"  th:text="${status.count}">1</td>
            <td class="td-nome" th:text="${aluno.nome}">Nome</td>
            <td class="td-cpf"  th:text="${aluno.cpf}">CPF</td>
            <td class="td-id"   th:text="${aluno.id}" th:title="${aluno.id}">UUID</td>
            <td class="td-acao">
                <button class="menu-btn" onclick="toggleMenu(this)" type="button" aria-label="Ações">
                    <span></span><span></span><span></span>
                </button>
                <div class="dropdown">
                    <a class="dropdown-item" th:href="@{/aluno/editar(id=${aluno.id})}">
                        <span class="dropdown-icon">✏️</span> Editar aluno
                    </a>
                    <div class="dropdown-divider"></div>
                    <form th:action="@{/aluno/excluir}" method="post"
                          onsubmit="return confirm('Tem certeza que deseja excluir este aluno?')">
                        <input type="hidden" name="id" th:value="${aluno.id}">
                        <button class="dropdown-item danger" type="submit">
                            <span class="dropdown-icon">🗑️</span> Excluir aluno
                        </button>
                    </form>
                </div>
            </td>
        </tr>
    </tbody>
</table>
